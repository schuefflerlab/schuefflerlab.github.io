<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
    <style>
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin:0; padding:0; }
      header, footer { background:#f3f4f6; padding:12px 20px; }
      nav ul { list-style:none; margin:0; padding:0; display:flex; flex-wrap:wrap; gap:12px; }
      nav a { text-decoration:none; color:#111827; }
      main { padding:20px; }
      .search-input { width:100%; max-width:420px; padding:10px 14px; border:1px solid #d1d5db; border-radius:10px; margin-bottom:18px; }
      mark { background:#fde68a; color:inherit; padding:0 0.15rem; border-radius:0.15rem; }
      .publications { max-width: 860px; margin: 0 auto; }
      .publication-list { list-style:none; margin:0; padding:0; }
      .publication-item { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #e5e7eb; }
      .publication-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
      .publication-title { font-weight: 700; margin: 0 0 0.25rem; }
      .publication-meta { color:#4b5563; margin: 0.25rem 0 0.75rem; }
      .publication-links a { color:#1d4ed8; text-decoration:none; margin-right: 1rem; }
      .publication-links a:hover { text-decoration:underline; }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/team' | relative_url }}">Team</a></li>
          <li><a href="{{ '/research' | relative_url }}">Research</a></li>
          <li><a href="{{ '/teaching' | relative_url }}">Teaching</a></li>
          <li><a href="{{ '/software' | relative_url }}">Software</a></li>
          <li><a href="{{ '/jobs' | relative_url }}">Jobs</a></li>
          <li><a href="{{ '/contact' | relative_url }}">Contact</a></li>
          <li><a href="{{ '/imprint' | relative_url }}">Imprint</a></li>
        </ul>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}</p>
    </footer>
  </body>
</html>
